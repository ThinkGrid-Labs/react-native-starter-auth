pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: yarn eslint {staged_files} --max-warnings=0

    format:
      glob: "*.{js,ts,jsx,tsx}"
      run: yarn prettier --check {staged_files}

    types:
      glob: "*.{js,ts,jsx,tsx}"
      run: yarn tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: yarn commitlint --edit {1}
